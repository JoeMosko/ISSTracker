<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>International Space Station Tracker</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        html,body{ 
                   margin:0; 
                   height:100%; 
                 }
        .wrapper { position:relative; 
                   width:100%; 
                   height:100%; 
                 }
        h1 {
            color: #1a237e; 
            text-align: center;
            position: relative;
            font-size: 45px;
            font-family: 'Segoe UI', sans-serif;
            margin-top: 5px;
            margin-bottom: 10px;
             }
        
        #velocityUpdate{
            color: #0d47a1; 
            text-align: center;
            position: relative;
            font-size: 35px;
            font-family: 'Segoe UI', sans-serif;
            margin-top: 25px;
            z-index: -1;}
        /* Leaflet map */
        #map {
            width: 90%;
            height: 75%;  
            margin: 0 auto; 
            margin-top: 50px;
            border: 6px solid #94cdde;
            border-radius: 8px;
            position: relative;
            }
       
           
             </style>


</head>





<body style="background-color: #e0e8f1;">

<!---Create an id for velocity, since it will have to be changed every 5 seconds -->
<h1>International Space Station Tracker by Joe Mosko</h1>
<div id= "velocityUpdate"></div>
<div class="wrapper">

<div id="map"></div>

</div>






<!-- Leaflet JS (ISS Tracker) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- ISS Tracker Code -->
<script>
 // Create the map 
 var map = L.map('map',{
    center: [0,0],  // Center the map at coordinates (0,0)
    zoom: 3,        // Set initial zoom to 3
    maxZoom: 7,    // Set max zoom to 10
    minZoom: 3      // Set minZoom to 3 (removes paneling)
 });

 // Add the map tile layer
 L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
    { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors' }
 ).addTo(map);

 // ISS Marker Icon
 var issIcon = L.icon({
    iconUrl: '/static/ISSPIC.png', 
    iconSize: [100, 100],
    iconAnchor: [25, 25],
    popupAnchor: [0, -25] 
 });

 // Create ISS Marker out of the issIcon
 const issMarker = L.marker([0, 0], {icon: issIcon}).addTo(map)
 .bindPopup("Current location of the ISS")
 .openPopup();

 // Function to fetch and update ISS location
 async function updateISSLocation(){
    //Fetch iss coordinates
    const functResponse = await fetch('/api/iss-location');
    const data = await functResponse.json();
    //Create variables from the JSON package fetched
    const lat = data.latitude;
    const long = data.longitude;
    //Set the ISS marker to these coordinates 
    issMarker.setLatLng([lat, long]);
 }


// Function to fetch and update ISS velocity and time
 async function updateISSVelocity(){
    //Fetch iss coordinates
    const functResponse = await fetch('/api/velocity');
    const data = await functResponse.json();
    //Parse velocity from JSON  (key-value)
    const velocity = data.velocity;
    //Sets the inner text of the element "velocityUpdate" which we created earlier to update velocity 
    //toFixed shows 2 decimal places 
    document.getElementById("velocityUpdate").innerText = `Current ISS Velocity: ${velocity.toFixed(2)} km/h`;
 }
 // Run once and then every 3 seconds
 updateISSLocation();
 setInterval(updateISSLocation, 3000);
 //Update velocity every 5 seconds
 updateISSVelocity()
 setInterval(updateISSVelocity, 5000)
</script>



</body>
</html>
